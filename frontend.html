      * {

        padding: 0;
        box-sizing: border-box;

      body {
        font-family: Arial, sans-serif;
        background: #f0f4f8;

      /* NAVBAR */
      .navbar {
        background: #1a73e8;
        padding: 15px 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      .navbar h1 {
        color: white;
        font-size: 1.3rem;
      }

      .nav-links {
        display: flex;
        gap: 10px;
      }

      .nav-links button {
        background: transparent;
        color: white;
        border: 2px solid white;
        padding: 8px 18px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: 0.3s;
      }

      .nav-links button:hover,
      .nav-links button.active {
        background: white;
        color: #1a73e8;
        font-weight: bold;
      }

      /* CONTAINER */
      .container {
        max-width: 1100px;
        margin: 30px auto;
        padding: 0 20px;
      }

      /* STATS */
      .stats {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-card {
        background: white;
        border-radius: 12px;
        padding: 20px 30px;
        flex: 1;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        border-top: 4px solid #1a73e8;
      }

      .stat-card h2 {
        font-size: 2rem;
        color: #1a73e8;
      }

      .stat-card p {
        color: #777;
        font-size: 0.9rem;
        margin-top: 5px;
      }

      /* SECTION */
      .section {
        display: none;
      }

      .section.active {
        display: block;
      }

      /* CARD HEADER */
      .card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .card-header {
        background: #1a73e8;
        padding: 15px 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .card-header h2 {
        color: white;
        font-size: 1.1rem;
      }

      /* SEARCH */
      .search-box {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .search-box input {
        padding: 8px 14px;
        border-radius: 20px;
        border: none;
        outline: none;
        font-size: 0.9rem;
        width: 200px;
      }

      .search-box button {
        padding: 8px 16px;
        background: white;
        color: #1a73e8;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
        font-size: 0.85rem;
      }

      /* TABLE */
      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #f8f9fa;
        padding: 12px 20px;
        text-align: left;
        font-size: 0.85rem;
        color: #555;
        border-bottom: 2px solid #e0e0e0;
      }

      td {
        padding: 12px 20px;
        border-bottom: 1px solid #f0f0f0;
        font-size: 0.9rem;
        color: #333;
      }

      tr:hover {
        background: #f5f9ff;
      }

      /* BADGE */
      .badge {
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 0.78rem;
        font-weight: bold;
      }

      .badge-male {
        background: #e3f2fd;
        color: #1a73e8;
      }

      .badge-female {
        background: #fce4ec;
        color: #e91e63;
      }

      /* LOADING & EMPTY */
      .loading,
      .empty {
        text-align: center;
        padding: 40px;
        color: #aaa;
        font-size: 0.95rem;
      }

      /* REFRESH BTN */
      .refresh-btn {
        background: transparent;
        border: 2px solid white;
        color: white;
        padding: 6px 14px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.85rem;
      }

      .refresh-btn:hover {
        background: white;
        color: #1a73e8;
      }
    </style>

      // Tampilkan section
      function showSection(name, btn) {
        document
          .querySelectorAll(".section")
          .forEach((s) => s.classList.remove("active"));
        document
          .querySelectorAll(".nav-links button")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById("section-" + name).classList.add("active");
        btn.classList.add("active");

        if (name === "patients") loadPatients();
        if (name === "doctors") loadDoctors();
      }

      // Load semua pasien
      async function loadPatients(search = "") {
        const tbody = document.getElementById("patients-table");
        tbody.innerHTML =
          '<tr><td colspan="7" class="loading">Memuat data...</td></tr>';

        try {
          const url = search
            ? `${BASE_URL}/patients/index.php?search=${search}`
            : `${BASE_URL}/patients/index.php`;

          const res = await fetch(url, {
            headers: {
              "x-api-key": localStorage.getItem("apiKey"),
            },
          });
          const data = await res.json();

          document.getElementById("total-patients").textContent =
            data.data.length;

          if (data.data.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="7" class="empty">Tidak ada data pasien</td></tr>';
            return;
          }

          tbody.innerHTML = data.data
            .map(
              (p, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td><b>${p.name}</b></td>
                    <td>${p.nik}</td>
                    <td>${p.birth_date}</td>
                    <td>
                        <span class="badge ${p.gender === "Laki-laki" ? "badge-male" : "badge-female"}">
                            ${p.gender}
                        </span>
                    </td>
                    <td>${p.phone ?? "-"}</td>
                    <td>${p.address ?? "-"}</td>
                </tr>
            `,
            )
            .join("");
        } catch (err) {
          tbody.innerHTML =
            '<tr><td colspan="7" class="empty">Gagal memuat data!</td></tr>';
        }
      }

      // Search pasien
      let searchTimeout;
      function searchPatient() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          const keyword = document.getElementById("search-input").value;
          loadPatients(keyword);
        }, 400);
      }

      // Load semua dokter

        const tbody = document.getElementById("doctors-table");
        tbody.innerHTML =
          '<tr><td colspan="4" class="loading">Memuat data...</td></tr>';

        try {
          const res = await fetch(`${BASE_URL}/doctors/index.php`);

          document.getElementById("total-doctors").textContent =
            data.data.length;

          if (data.data.length === 0) {
            tbody.innerHTML =

            return;
          }

          tbody.innerHTML = data.data
            .map(
              (d, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td><b>${d.name}</b></td>
                    <td>${d.specialization}</td>
                    <td>${d.phone ?? "-"}</td>
                </tr>
            `,
            )
            .join("");
        } catch (err) {
          tbody.innerHTML =
            '<tr><td colspan="4" class="empty">Gagal memuat data!</td></tr>';
        }
      }
